name: Build and Update Repository

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"

env:
  RELEASE_TAG: repository
  REPO_NAME: custom

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build builder image
        run: |
          docker build -t package-builder build-container/

      - name: Detect changed packages
        id: changes
        run: |
          # For first commit or when base commit is not available,
          # check all packages
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || \
             ! git rev-parse --verify "${{ github.event.before }}" >/dev/null 2>&1; then
            echo "First push or base commit not available, checking all packages"
            CHANGED_PKGS=$(git submodule | awk '{print $2}' | tr '\n' ' ')
            DIRECT_CHANGES=$(find . -maxdepth 2 -name PKGBUILD | cut -d/ -f2 | tr '\n' ' ')
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE_REF=${{ github.event.pull_request.base.sha }}
            else
              BASE_REF=${{ github.event.before }}
            fi

            # Get list of changed submodules
            CHANGED_PKGS=$(git diff-tree --name-only -r "$BASE_REF" "${{ github.sha }}" | \
                          grep -E "^[^/]+$" | \
                          while read -r module; do
                            if [ -f "$module/PKGBUILD" ]; then
                              echo "$module"
                            fi
                          done | tr '\n' ' ')

            # Also check for changes in PKGBUILDs directly in this repo
            DIRECT_CHANGES=$(git diff-tree --name-only -r "$BASE_REF" "${{ github.sha }}" | \
                          grep -E "^[^/]+/PKGBUILD$" | \
                          cut -d/ -f1 | tr '\n' ' ')
          fi

          # Combine both lists and remove duplicates
          ALL_CHANGES="$CHANGED_PKGS $DIRECT_CHANGES"
          FINAL_CHANGES=$(echo "$ALL_CHANGES" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ' ' | sed 's/ *$//')

          echo "packages=${FINAL_CHANGES}" >> $GITHUB_OUTPUT
          echo "Changed packages: ${FINAL_CHANGES}"

      - name: Import GPG key
        run: |
          gpg --import --no-tty <<<"${{ secrets.GPG_KEY }}"
          echo "${{ vars.GPG_KEY_ID }}:5:" | gpg --no-tty --import-ownertrust

      - name: Build packages
        if: steps.changes.outputs.packages != ''
        run: |
          docker run --rm \
            --privileged \
            -e CHANGED_PACKAGES="${{ steps.changes.outputs.packages }}" \
            -e GPG_KEY_DATA="${{ secrets.GPG_KEY }}" \
            -e GPG_KEY_ID="${{ vars.GPG_KEY_ID }}" \
            -v ${{ github.workspace }}:/build \
            -v ${{ github.workspace }}/repo:/repo \
            package-builder

      - name: Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release and tag
          gh release delete ${{ env.RELEASE_TAG }} --yes || true
          git tag -d ${{ env.RELEASE_TAG }} || true
          git push origin :refs/tags/${{ env.RELEASE_TAG }} || true

          # Create new release
          gh release create ${{ env.RELEASE_TAG }} \
            --title "Package Repository" \
            --notes "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            repo/x86_64/* \
            repo/i686/*

          # Force update tag
          git tag -f ${{ env.RELEASE_TAG }}
          git push -f origin ${{ env.RELEASE_TAG }}

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            repo/**/*.log
            repo/**/build-output.txt
          retention-days: 7
